name: Competitor & Media Monitor

on:
  schedule:
    # Runs daily at 9:00 CET (8:00 UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  competitor-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Download previous data
        uses: actions/download-artifact@v4
        with:
          name: monitor-data
          path: data/
        continue-on-error: true  # First run won't have data

      - name: Run full monitor (competitor + media)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python monitor.py --no-screenshots

      - name: Upload data for next run
        uses: actions/upload-artifact@v4
        with:
          name: monitor-data
          path: data/
          retention-days: 90
